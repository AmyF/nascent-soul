[plugin]

name="NascentSoul"
description="NascentSoul is a Godot 4.6 card-zone plugin built around a modular `Zone` runtime:

- Layout policies (`ZoneLayoutPolicy`) calculate placements for hand, pile, row, and list zones.
- Display styles (`ZoneDisplayStyle`) animate placements without storing shared runtime state.
- Interaction config (`ZoneInteraction`) keeps gestures declarative while runtime controllers own drag, range-selection, and background-clear state.
- Permission and sorting policies keep transfers explicit and extensible.
- Composite permissions let zones combine source, capacity, and custom rule checks without custom glue code.
- Group sorting lets zones cluster cards by tag, type, or metadata before applying within-group order.
- Configurable drag visual factories let each zone choose its preview ghost and cursor proxy behavior.
- Optional card types (`ZoneCard`, `CardData`) add face-up/face-down presentation, highlighting, and drag ghosts.
- Example hub, recipe scenes, and headless regression suites ship with the plugin.
"
author="unko"
version="0.7"
script="nascentsoul.gd"
